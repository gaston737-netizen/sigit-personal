databases:
  - name: sigit-db
    databaseName: sigit
    plan: free

services:
  - type: web
    name: sigit-personal
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sigit-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
