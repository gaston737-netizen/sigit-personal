kind = "web"
previewPath = "/"
title = "SIGIT Personal"
version = "1.0.0"
id = "artifacts/sigit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25662

[services.development]
run = "pnpm --filter @workspace/sigit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sigit", "run", "build" ]
publicDir = "artifacts/sigit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25662"
BASE_PATH = "/"
